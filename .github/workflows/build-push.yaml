# =============================================================================
# GitHub Actions — Build and push Docker image to GHCR
# Triggers on every push to main. Tags with commit SHA and "latest".
# =============================================================================
name: Build and Push to GHCR

on:
  push:
    branches:
      - main

env:
  # TODO: Replace YOUR_ORG with your GitHub org or username
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/YOUR_ORG/ai-triage-nurse

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
