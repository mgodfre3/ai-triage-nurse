# =============================================================================
# AI Triage Nurse — PersistentVolumeClaim for model caching
# Prevents re-downloading Foundry Local models on every pod restart.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: ai-triage-nurse
  labels:
    app: ai-triage-nurse
spec:
  accessModes:
    - ReadWriteMany
  # Use Longhorn for RWX on Azure Local
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
