# =============================================================================
# AI Triage Nurse — Kubernetes Service
# Exposes the app via NodePort for external access on Arc-enabled AKS.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ai-triage-nurse
  namespace: ai-triage-nurse
  labels:
    app: ai-triage-nurse
spec:
  type: NodePort
  selector:
    app: ai-triage-nurse
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
