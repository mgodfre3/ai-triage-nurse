# =============================================================================
# AI Triage Nurse — Kubernetes Deployment
# Targets Arc-enabled AKS cluster "denver-cluster".
# Foundry Local models require significant RAM; resource requests sized accordingly.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-triage-nurse
  namespace: ai-triage-nurse
  labels:
    app: ai-triage-nurse
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-triage-nurse
      component: server
  template:
    metadata:
      labels:
        app: ai-triage-nurse
        component: server
    spec:
      # --- Pod anti-affinity: prefer spreading replicas across nodes ---
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ai-triage-nurse
                topologyKey: kubernetes.io/hostname

      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: ai-triage-nurse
          # TODO: Replace mgodfre3 with your GitHub org or username
          image: ghcr.io/mgodfre3/ai-triage-nurse:v1.3.0
          ports:
            - containerPort: 8080
              protocol: TCP

          env:
            - name: FOUNDRY_API_BASE
              value: "http://ollama:11434/v1"
            - name: FOUNDRY_API_KEY
              value: "ollama"
            - name: FOUNDRY_MODEL_CHAT
              value: "qwen2.5:3b"
            - name: FOUNDRY_MODEL_AUDIO
              value: "whisper-tiny"
            - name: PYTHONUNBUFFERED
              value: "1"

          resources:
            requests:
              cpu: "500m"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

          # --- Startup probe: generous timeout for first-run model downloads ---
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 60      # 60 × 10s = up to 10 minutes for cold model download
            periodSeconds: 10

          # --- Liveness probe: restart if unhealthy ---
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # --- Readiness probe: don't route traffic until models are loaded ---
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
