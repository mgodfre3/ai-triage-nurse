# =============================================================================
# Flux Image Automation — watches GHCR for new image tags and applies updates
# TODO: Replace YOUR_ORG with your GitHub org or username
# =============================================================================
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: ai-triage-nurse
  namespace: flux-system
spec:
  image: ghcr.io/YOUR_ORG/ai-triage-nurse
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ai-triage-nurse
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ai-triage-nurse
  policy:
    semver:
      range: ">=1.0.0"
