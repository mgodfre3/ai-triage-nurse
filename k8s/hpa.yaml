# =============================================================================
# AI Triage Nurse — Horizontal Pod Autoscaler
# Scales between 2-6 replicas based on CPU and memory utilisation.
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-triage-nurse
  namespace: ai-triage-nurse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-triage-nurse
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
